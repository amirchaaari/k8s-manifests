apiVersion: apps/v1
kind: Deployment
metadata:
  name: wso2-notifier-backend
  namespace: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wso2-notifier-backend
  template:
    metadata:
      labels:
        app: wso2-notifier-backend
    spec:
      containers:
      - name: backend
        image: amirchaari/wso2-notifier-backend:22
        ports:
        - containerPort: 8080
        env:
        # ── Database ─────────────────────────────────────────────────────────
        - name: DB_URL
          value: jdbc:postgresql://data-postgresql.data.svc:5432/apim_incidents
        - name: DB_USERNAME
          value: apim_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: db-password

        # ── Elasticsearch ────────────────────────────────────────────────────
        - name: ES_HOST
          value: elasticsearch-master.observability.svc
        - name: ES_PORT
          value: "9200"
        - name: ES_SCHEME
          value: "https"
        - name: ES_USERNAME
          value: elastic
        - name: ES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: es-password
        - name: ES_CA_CERT_PATH
          value: /etc/es-certs/ca.crt

        # ── JWT ──────────────────────────────────────────────────────────────
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jwt-secret

        # ── Admin default account ────────────────────────────────────────────
        - name: ADMIN_DEFAULT_USERNAME
          value: admin
        - name: ADMIN_DEFAULT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: admin-password

        # ── AI (Groq/Gemini) ─────────────────────────────────────────────────
        - name: AI_PROVIDER
          value: groq
        - name: GROK_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: groq-api-key
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: gemini-api-key
              optional: true

        # ── SMTP (Mailtrap or real SMTP) ─────────────────────────────────────
        - name: SMTP_HOST
          value: sandbox.smtp.mailtrap.io
        - name: SMTP_PORT
          value: "2525"
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: smtp-username
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: smtp-password

        # ── WSO2 ─────────────────────────────────────────────────────────────
        - name: WSO2_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: wso2-admin-password
        - name: WSO2_DCR_URL
          value: https://apim-wso2am-all-in-one-am-service.wso2.svc:9443/client-registration/v0.17/register
        - name: WSO2_TOKEN_URL
          value: https://apim-wso2am-all-in-one-am-service.wso2.svc:9443/oauth2/token
        - name: WSO2_WORKFLOW_URL
          value: https://apim-wso2am-all-in-one-am-service.wso2.svc:9443/api/am/admin/v4/workflows

        volumeMounts:
        - name: es-ca-cert
          mountPath: /etc/es-certs
          readOnly: true

      volumes:
      - name: es-ca-cert
        secret:
          secretName: es-ca-cert

---
apiVersion: v1
kind: Service
metadata:
  name: wso2-notifier-backend
  namespace: application
spec:
  type: ClusterIP
  selector:
    app: wso2-notifier-backend
  ports:
  - port: 8080
    targetPort: 8080
