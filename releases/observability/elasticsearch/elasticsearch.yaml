apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch
  namespace: observability
spec:
  version: 9.0.0
  http:
    tls:
      selfSignedCertificate:
        # Cover the "elasticsearch-master" shim service names so downstream
        # clients (Logstash, backend) keep using that host with TLS verification.
        subjectAltNames:
          - dns: elasticsearch-master
          - dns: elasticsearch-master.observability
          - dns: elasticsearch-master.observability.svc
          - dns: elasticsearch-master.observability.svc.cluster.local
  nodeSets:
    - name: default
      count: 1
      config:
        node.store.allow_mmap: false
      podTemplate:
        spec:
          containers:
            - name: elasticsearch
              resources:
                requests:
                  cpu: 250m
                  memory: 2Gi
                limits:
                  memory: 2Gi
              env:
                - name: ES_JAVA_OPTS
                  value: "-Xms1g -Xmx1g"
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
            storageClassName: standard-rwo
