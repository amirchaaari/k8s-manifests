clusterName: elasticsearch
replicas: 1
minimumMasterNodes: 1

esJavaOpts: "-Xmx1g -Xms1g"

resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

volumeClaimTemplate:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi

# Let the chart handle security completely
protocol: https

extraEnvs:
  - name: ELASTIC_PASSWORD
    value: "elastic_pass_2024"

persistence:
  enabled: true

service:
  type: ClusterIP
