replicas: 1

image: docker.elastic.co/logstash/logstash
imageTag: 8.5.1

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "1536Mi"

logstashPipeline:
  logstash.conf: |
    # ============================
    # INPUT
    # ============================
    input {
      beats {
        port => 5044
      }
    }

    # ============================
    # FILTER
    # ============================
    filter {

      # ----------------------------
      # APIM METRICS
      # ----------------------------
      if [message] =~ /apimMetrics:/ {
        grok {
          match => [
            "message",
            "%{GREEDYDATA:UNWANTED} apimMetrics:%{GREEDYDATA:apimMetrics}, %{GREEDYDATA:UNWANTED} :%{GREEDYDATA:properties}"
          ]
        }

        json {
          source => "properties"
        }
      }

      # ----------------------------
      # AUDIT LOGS
      # ----------------------------
      else if [message] =~ /\{AUDIT_LOG\}/ {

        grok {
          match => [
            "message",
            "TID: \[%{DATA:tid}\] \[%{DATA:log_timestamp}\]\s+%{LOGLEVEL:level} \{AUDIT_LOG\} - %{GREEDYDATA:audit_content}"
          ]
        }

        # ----------------------------
        # HTTP DELETE
        # ----------------------------
        if [audit_content] =~ /^DELETE/ {
          grok {
            match => [
              "audit_content",
              "%{WORD:method} %{DATA:requestPath} user: %{DATA:userName} app: %{DATA:appId}"
            ]
          }
          mutate {
            add_field => {
              "eventType"     => "delete_http"
              "isDeleteEvent" => "false"
            }
          }
        }

        # ----------------------------
        # JSON DELETE CONFIRMATION
        # ----------------------------
        else if [audit_content] =~ /^\{/ {
          json {
            source => "audit_content"
          }
          mutate { lowercase => ["action"] }

          if [action] == "deleted" {
            mutate {
              add_field => {
                "eventType"     => "delete_confirmed"
                "isDeleteEvent" => "true"
              }
            }
          }
        }

        # ----------------------------
        # LOGIN ATTEMPT
        # ----------------------------
        else if [audit_content] =~ /Action : Login/ {
          grok {
            match => [
              "audit_content",
              "Initiator : %{DATA:initiator} \| Action : %{DATA:audit_action} \| Target : %{DATA:target} \| Data : %{DATA:data_raw} \| Result : %{GREEDYDATA:result}"
            ]
          }

          json {
            source => "data_raw"
            target => "data"
          }

          mutate {
            add_field => {
              "eventType"           => "login_attempt"
              "serviceProviderName" => "%{[data][ServiceProviderName]}"
              "remoteAddress"       => "%{[data][RemoteAddress]}"
              "userName"            => "%{initiator}"
            }
          }

          if [result] =~ /Failed/ {
            mutate { add_field => { "loginResult" => "failed" } }
          } else {
            mutate { add_field => { "loginResult" => "success" } }
          }
        }
      }

      # ============================
      # WSO2 OPEN TELEMETRY TRACES
      # ============================
      else if [message] =~ /TRACE/ {

        grok {
          match => [
            "message",
            "%{TIME:trace_timestamp}\s+\[-\]\s+\[%{DATA:thread}\]\s+TRACE\s+%{GREEDYDATA:trace_json}"
          ]
        }

        if [trace_json] {
          json {
            source => "trace_json"
            remove_field => ["trace_json"]
          }

          mutate {
            rename => {
              "Tracer Id" => "trace_id"
              "Span Id"   => "span_id"
              "Operation" => "operation"
              "Latency"   => "latency"
              "Tags"      => "tags_json"
            }
          }
        }
      }
    }

    # ============================
    # OUTPUT
    # ============================
    output {

      # apim:response events
      if [apimMetrics] == " apim:response" {
        elasticsearch {
          hosts => ["https://elasticsearch-master:9200"]
          index => "apim_event_response"
          user => "elastic"
          password => "${ELASTIC_PASSWORD}"
          ssl => true
          ssl_certificate_verification => false
        }
      }

      # apim:faulty events
      else if [apimMetrics] == " apim:faulty" {
        elasticsearch {
          hosts => ["https://elasticsearch-master:9200"]
          index => "apim_event_faulty"
          user => "elastic"
          password => "${ELASTIC_PASSWORD}"
          ssl => true
          ssl_certificate_verification => false
        }
      }

      # audit delete confirmation
      if [isDeleteEvent] == "true" {
        elasticsearch {
          hosts => ["https://elasticsearch-master:9200"]
          index => "wso2_audit_delete"
          user => "elastic"
          password => "${ELASTIC_PASSWORD}"
          ssl => true
          ssl_certificate_verification => false
        }
      }

      # login attempts
      if [eventType] == "login_attempt" {
        elasticsearch {
          hosts => ["https://elasticsearch-master:9200"]
          index => "wso2_audit_logs"
          user => "elastic"
          password => "${ELASTIC_PASSWORD}"
          ssl => true
          ssl_certificate_verification => false
        }
      }

      # trace output
      if [trace_id] {
        elasticsearch {
          hosts => ["https://elasticsearch-master:9200"]
          index => "wso2_traces"
          user => "elastic"
          password => "${ELASTIC_PASSWORD}"
          ssl => true
          ssl_certificate_verification => false
        }
      }
    }

logstashJavaOpts: "-Xmx768m -Xms768m"

extraEnvs:
  - name: ELASTIC_PASSWORD
    value: "elastic_pass_2024"

# Override default logstash.yml to remove default ES host
logstashConfig:
  logstash.yml: |
    http.host: 0.0.0.0
    xpack.monitoring.enabled: false

service:
  type: ClusterIP
  ports:
    - name: beats
      port: 5044
      protocol: TCP
      targetPort: 5044

persistence:
  enabled: false
