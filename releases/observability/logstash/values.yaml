replicas: 1

image: docker.elastic.co/logstash/logstash
imageTag: 8.5.1

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "1536Mi"

logstashPipeline:
  logstash.conf: |
    input {
      beats {
        port => 5044
      }
    }

    filter {
      if [fields][log_type] == "wso2-apim" {
        grok {
          match => {
            "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] INFO - %{DATA:api_name} \| %{DATA:api_version} \| %{DATA:consumer_key} \| %{DATA:context} \| %{DATA:resource_path} \| %{DATA:resource} \| %{DATA:http_method} \| %{NUMBER:response_code} \| %{NUMBER:response_time} \| %{NUMBER:request_count}"
          }
        }
        date {
          match => ["timestamp", "ISO8601"]
          target => "@timestamp"
        }
        mutate {
          convert => {
            "response_code" => "integer"
            "response_time" => "float"
            "request_count" => "integer"
          }
          add_field => { "environment" => "internship" }
        }
      }
    }

    output {
      elasticsearch {
        hosts => ["https://elasticsearch-master:9200"]
        index => "wso2-apim-logs-%{+YYYY.MM.dd}"
        user => "elastic"
        password => "${ELASTIC_PASSWORD}"
        ssl => true
        ssl_certificate_verification => false
      }
    }

logstashJavaOpts: "-Xmx768m -Xms768m"

extraEnvs:
  - name: ELASTIC_PASSWORD
    value: "elastic_pass_2024"

# Override default logstash.yml to remove default ES host
logstashConfig:
  logstash.yml: |
    http.host: 0.0.0.0
    xpack.monitoring.enabled: false

service:
  type: ClusterIP
  ports:
    - name: beats
      port: 5044
      protocol: TCP
      targetPort: 5044

persistence:
  enabled: false
